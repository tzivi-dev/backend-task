version: '3.8'

services:
  # שירות מסד הנתונים
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"

  # שירות האפליקציה שלנו
  app:
    build: .
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/game_db?schema=public
    # הפקודה הבאה מבצעת:
    # 1. המתנה קצרה למסד הנתונים
    # 2. הרצת המיגרציות (prisma migrate) כדי ליצור את הטבלאות
    # 3. הרצת הקוד הראשי שלנו
    command: >
      sh -c "npx prisma migrate dev --name init && node src/main.js"